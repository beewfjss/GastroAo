<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GastroAI — Asystent dla Twojej restauracji</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0f0f0f; color: #f0ede8; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 36px; font-weight: 900; text-align: center; margin-bottom: 10px; }
  h1 span { color: #ff6b35; }
  .sub { text-align: center; color: #888; margin-bottom: 40px; font-size: 16px; }
  label { display: block; font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
  input, select, textarea { width: 100%; background: #222; border: 1px solid #333; border-radius: 8px; color: #f0ede8; font-size: 15px; padding: 12px; outline: none; }
  textarea { min-height: 80px; resize: vertical; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; margin-bottom: 24px; }
  .check { background: #222; border: 1px solid #333; border-radius: 8px; padding: 12px; cursor: pointer; font-size: 14px; text-align: center; }
  .check.on { border-color: #ff6b35; background: rgba(255,107,53,0.1); }
  .btn { width: 100%; background: #ff6b35; border: none; border-radius: 10px; color: #000; font-size: 16px; font-weight: 700; padding: 16px; cursor: pointer; margin-top: 8px; }
  .btn:hover { opacity: 0.9; }
  #loading { display: none; text-align: center; padding: 60px 20px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #results { display: none; }
  .result-box { background: #181818; border: 1px solid #333; border-radius: 12px; margin-top: 20px; padding: 24px; white-space: pre-wrap; font-size: 14px; line-height: 1.8; color: #d0ccc6; }
  .result-box h3 { color: #ff6b35; font-size: 15px; margin-bottom: 12px; }
  .copy-btn { background: #ff6b35; border: none; border-radius: 8px; color: #000; font-size: 14px; font-weight: 700; padding: 10px 20px; cursor: pointer; margin-top: 16px; width: 100%; }
  .success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 10px; padding: 14px; color: #4ade80; margin-bottom: 16px; text-align: center; }
  .back-btn { background: none; border: 1px solid #444; border-radius: 8px; color: #888; font-size: 14px; padding: 10px 20px; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">

  <div id="form">
    <h1>Marketing restauracji<br>na <span>autopilocie</span></h1>
    <p class="sub">Wpisz dane lokalu — AI wygeneruje gotowe treści w 30 sekund</p>

    <div class="grid">
      <div>
        <label>Nazwa lokalu</label>
        <input id="nazwa" type="text" placeholder="np. Cukiernia Sowa">
      </div>
      <div>
        <label>Typ lokalu</label>
        <select id="typ">
          <option>Restauracja</option>
          <option>Kawiarnia</option>
          <option>Cukiernia</option>
          <option>Lodziarnia</option>
          <option>Bistro</option>
          <option>Pizzeria</option>
          <option>Bar / Pub</option>
        </select>
      </div>
      <div>
        <label>Miasto</label>
        <input id="miasto" type="text" placeholder="np. Szczecin">
      </div>
      <div>
        <label>Styl kuchni</label>
        <input id="kuchnia" type="text" placeholder="np. polska, włoska">
      </div>
    </div>

    <label>Co wyróżnia Twój lokal? (opcjonalnie)</label>
    <textarea id="opis" placeholder="np. domowe ciasta, ogródek przy rzece..."></textarea>

    <label>Co wygenerować?</label>
    <div class="checks">
      <div class="check on" data-v="posty">📱 Posty Instagram/FB</div>
      <div class="check on" data-v="opinie">⭐ Odpowiedzi na opinie</div>
      <div class="check on" data-v="promocja">🎯 Promocja tygodnia</div>
      <div class="check" data-v="ogłoszenie">👨‍🍳 Ogłoszenie o pracę</div>
    </div>

    <button class="btn" onclick="generate()">✨ Generuj materiały</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p style="color:#888">AI tworzy treści dla Twojego lokalu...<br><small>ok. 20-30 sekund</small></p>
  </div>

  <div id="results"></div>

</div>

<script>
  document.querySelectorAll('.check').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('on'));
  });

  async function generate() {
    const nazwa = document.getElementById('nazwa').value.trim();
    const typ = document.getElementById('typ').value;
    const miasto = document.getElementById('miasto').value.trim();
    const kuchnia = document.getElementById('kuchnia').value.trim();
    const opis = document.getElementById('opis').value.trim();

    if (!nazwa || !miasto || !kuchnia) {
      alert('Wpisz nazwę lokalu, miasto i styl kuchni.');
      return;
    }

    const wybrane = [...document.querySelectorAll('.check.on')].map(e => e.dataset.v);
    if (!wybrane.length) { alert('Wybierz co najmniej jedną opcję.'); return; }

    document.getElementById('form').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    let prompt = `Jesteś ekspertem marketingu gastronomicznego w Polsce.
Lokal: ${nazwa}, ${typ}, ${miasto}
Kuchnia: ${kuchnia}
${opis ? 'Wyróżnia go: ' + opis : ''}

Napisz po polsku, naturalnie, bez korporacyjnego języka.\n\n`;

    if (wybrane.includes('posty')) prompt += `## POSTY SOCIAL MEDIA\nNapisz 3 angażujące posty na Instagram/Facebook z emoji i hashtagami. Oznacz POST 1, POST 2, POST 3.\n\n`;
    if (wybrane.includes('opinie')) prompt += `## ODPOWIEDZI NA OPINIE\nNapisz 3 odpowiedzi na opinie Google:\n- ODPOWIEDŹ 1: na 5 gwiazdek (zachwycony klient)\n- ODPOWIEDŹ 2: na 3 gwiazdki (zastrzeżenia do czasu)\n- ODPOWIEDŹ 3: na 2 gwiazdki (niezadowolony z obsługi)\n\n`;
    if (wybrane.includes('promocja')) prompt += `## PROMOCJA TYGODNIA\nStwórz atrakcyjną promocję: nazwa, opis, warunki, tekst na social media.\n\n`;
    if (wybrane.includes('ogłoszenie')) prompt += `## OGŁOSZENIE O PRACĘ\nNapisz angażujące ogłoszenie o pracę (kelner lub kucharz).\n\n`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showResults(data.text, nazwa);
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form').style.display = 'block';
      alert('Błąd: ' + e.message);
    }
  }

  function showResults(text, nazwa) {
    document.getElementById('loading').style.display = 'none';

    const div = document.getElementById('results');
    div.innerHTML = '';
    div.style.display = 'block';

    const success = document.createElement('div');
    success.className = 'success';
    success.textContent = '✅ Gotowe! Skopiuj i użyj od razu.';
    div.appendChild(success);

    const box = document.createElement('div');
    box.className = 'result-box';

    const title = document.createElement('h3');
    title.textContent = '✨ Materiały dla: ' + nazwa;
    box.appendChild(title);

    const content = document.createElement('div');
    content.textContent = text;
    box.appendChild(content);

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '📋 Kopiuj wszystko';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = '✓ Skopiowano!';
        setTimeout(() => { copyBtn.textContent = '📋 Kopiuj wszystko'; }, 2000);
      });
    };
    box.appendChild(copyBtn);

    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = '← Generuj nowe';
    backBtn.onclick = () => {
      div.style.display = 'none';
      document.getElementById('form').style.display = 'block';
    };
    box.appendChild(backBtn);

    div.appendChild(box);
    div.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
